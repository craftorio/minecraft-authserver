[PHP]
short_open_tag=off
detect_unicode=off
max_execution_time = 900
memory_limit = 1024M
upload_max_filesize = 256M
post_max_size = 256M
display_errors=on
error_reporting=E_ALL & ~E_DEPRECATED
max_input_vars = 100000
display_startup_errors = on
log_errors = on
error_log = /var/log/php/error.log
soap.wsdl_cache_ttl = 1
auto_prepend_file=/usr/local/etc/php/prepend.php
sendmail_path = "/usr/bin/msmtp -C /etc/msmtprc --logfile /var/www/authserver/var/log/msmtp.log -a mailhog -t"
[Date]
date.timezone=UTC
